---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-gateway-api-app
  namespace: gateway-system
spec:
  path: ./kubernetes/apps/gateway-api/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-gateway-api-config
  namespace: gateway-system
spec:
  dependsOn:
    - name: apps-gateway-api-app
  path: ./kubernetes/apps/gateway-api/config
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  interval: 30m
  retryInterval: 1m
  timeout: 5m