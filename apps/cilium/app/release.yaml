---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: v1.14.3
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    devices:
    - eth0
    externalIPs:
      enabled: true
    gatewayAPI:
      enabled: true
    hubble:
      enabled: true
      relay:
        enabled: true
        rollOutPods: true
      ui:
        enabled: true
        rollOutPods: true
    ingressController:
      enabled: true
      enforceHttps: true
      loadbalancerMode: shared
      secretsNamespace:
        create: true
        name: cilium-system
        sync: true
      service:
        name: cilium-ingress
        type: LoadBalancer
    ipam:
      mode: kubernetes
    k8sServiceHost: 10.69.11.201
    k8sServicePort: 6443
    kubeProxyReplacement: strict
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    l2announcements:
      enabled: true
      leaseDuration: 3s
      leaseRenewDeadline: 1s
      leaseRetryPeriod: 500ms
    operator:
      replicas: 1
      rollOutPods: true

        