---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: v1.14.3
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    l2announcements:
      enabled: true
    k8sServiceHost: 10.69.11.201
    k8sServicePort: 6443
    hubble:
      enabled: true
      relay:
        enabled: true
        rollOutPods: true
      ui:
        enabled: true
        rollOutPods: true
    ipam:
      mode: kubernetes
    gatewayAPI:
      enabled: true
    ingressController:
        enabled: true
        loadbalancerMode: shared
        enforceHttps: true
        secretsNamespace:
          create: true
          name: cilium-system
          sync: true
        service:
          name: cilium-ingress
          type: LoadBalancer
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    kubeProxyReplacement: strict
    operator:
      replicas: 1
      rollOutPods: true
    