---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: rajsingh-info-global-issuer
  namespace: cert-manager
spec:
  acme:
    email: rajsinghcpre@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-key
    solvers:
    - dns01:
        cloudflare:
          email: rajsinghcpre@gmail.com
          apiTokenSecretRef:
            name: cloudflare-api-token-secret
            key: api-token
--- 
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: certificate
  namespace: cert-manager
spec:
  dnsNames:
    - "*.rajsingh.info"
  secretName: wildcard-rajsingh-info-tls
  issuerRef:
    name: rajsingh-info-global-issuer
    kind: ClusterIssuer