apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: rajsingh-info
  annotations:
    cert-manager.io/issuer: ca-issuer
spec:
  gatewayClassName: cilium
  listeners:
  - name: wildcard-rajsingh-info
    protocol: HTTPS
    port: 443
    hostname: "*.rajsingh.info"
    tls:
      certificateRefs:
      - name: wildcard-rajsingh-info-tls
    allowedRoutes:
      namespaces:
        from: All