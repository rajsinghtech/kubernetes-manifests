---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: cilium
      version: v1.14.3
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  maxHistory: 2
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    devices:
    - eth0
    externalIPs:
      enabled: true
    gatewayAPI:
      enabled: true
    hubble:
      relay:
        enabled: true
      ui:
        enabled: true
    ipam:
      mode: kubernetes
      operator:
        clusterPoolIPv4MaskSize: 16
        clusterPoolIPv4PodCIDRList: 10.42.0.0/16
    k8sServiceHost: 10.69.11.201
    k8sServicePort: 6443
    kubeProxyReplacement: strict
    l2announcements:
      enabled: true
      leaseDuration: 300s
      leaseRenewDeadline: 60s
      leaseRetryPeriod: 10s
    k8sClientRateLimit:
      qps: 10
      burst: 25
    loadBalancer:
      algorithm: maglev
      mode: dsr
    localRedirectPolicy: true
    operator:
      replicas: 1
    routingMode: tunnel
    serviceAccounts:
      cilium:
        name: cilium
      operator:
        name: cilium-operator
    tunnelProtocol: vxlan
    securityContext:
      privileged: true
    tunnel: disabled
    ipv6:
      enabled: false
    k8s-require-ipv6-pod-cidr: false
    enableIPv6Masquerade: false
    extraConfig:
      enable-ipv6-ndp: "false"
    bpf:
      masquerade: true
    bgp:
      enabled: false
    endpointRoutes:
      enabled: true
    ipv4:
      enabled: true
    k8s-require-ipv4-pod-cidr: true